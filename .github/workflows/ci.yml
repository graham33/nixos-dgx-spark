name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]

jobs:
  authorize:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'ok-to-test'))
    steps:
      - run: echo "Build authorized"

  check:
    needs: authorize
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_on_tmpfs: true
          nix_conf: |
            extra-substituters = https://graham33.cachix.org
            extra-trusted-public-keys = graham33.cachix.org-1:DqH72VpwSrACa3+L9eqh4bixjWx9IQUaxQtRh4gtkX8=

      - uses: nixbuild/nixbuild-action@v24
        with:
          nixbuild_token: ${{ secrets.nixbuild_token }}

      - name: Build checks and packages
        run: |
          nix flake check --print-build-logs
